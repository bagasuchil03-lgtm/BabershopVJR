<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Interaktif Leaflet.js</title>
    
    <!-- Bootstrap 5 CSS untuk struktur Card agar rapi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        /* CSS untuk memastikan peta memenuhi container card-body */
        #map {
            height: 400px; /* Tinggi peta */
            width: 100%;
            border-radius: 0.375rem; /* Menyamakan border-radius dengan Bootstrap card */
            z-index: 1; /* Mencegah isu z-index dengan elemen modal dsb */
        }
    </style>
</head>
<body class="bg-light p-4">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Card Kontainer Peta -->
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Lokasi Barbershop Kami</h5>
                </div>
                <div class="card-body p-2">
                    <!-- Div elemen tempat peta akan dirender -->
                    <div id="map"></div>
                </div>
                <div class="card-footer text-muted text-center">
                    Klik marker untuk melihat detail lokasi.
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- Skrip Inisialisasi Peta -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Tentukan koordinat pusat peta (Contoh: Monas, Jakarta Pusat)
        // Format: [Latitude, Longitude]
        const centerLat = -6.175392; 
        const centerLng = 106.827153;
        
        // 2. Inisialisasi map pada elemen dengan id="map"
        // setView([lat, lng], zoomLevel)
        const map = L.map('map').setView([centerLat, centerLng], 15);

        // 3. Tambahkan layer Tile (Peta dasar dari OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        // 4. Tambahkan Marker (Penanda) di lokasi tersebut
        const marker = L.marker([centerLat, centerLng]).addTo(map);

        // 5. Tambahkan Popup yang akan muncul ketika marker diklik
        marker.bindPopup(`
            <div style="text-align: center;">
                <strong>Super Barbershop</strong><br>
                Jl. Contoh No. 123, Jakarta<br>
                Buka: 09:00 - 21:00
            </div>
        `).openPopup(); // .openPopup() langsung membuka popup saat peta dimuat
    });
</script>

</body>
</html>
